name: Build Discordia Terminal APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: gradle

      - name: Download Gradle Wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL -o gradle/wrapper/gradle-wrapper.jar \
            https://raw.githubusercontent.com/gradle/gradle/v8.7.0/gradle/wrapper/gradle-wrapper.jar

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: Build Release APK (unsigned)
        run: ./gradlew assembleRelease --no-daemon || true
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: List APK outputs
        if: always()
        run: find app/build/outputs/apk -name '*.apk' -exec ls -lh {} \; 2>/dev/null || echo No APKs built

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: discordia-terminal-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: discordia-terminal-release-unsigned
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          if-no-files-found: ignore
          retention-days: 30

      - name: Build Summary
        if: always()
        run: |
          echo "## Discordia Terminal APK Build" >> $GITHUB_STEP_SUMMARY
          if [ -f app/build/outputs/apk/debug/app-debug.apk ]; then
            SZ=$(du -sh app/build/outputs/apk/debug/app-debug.apk | cut -f1)
            echo "**Debug APK: SUCCESS - $SZ**" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Debug APK: FAILED**" >> $GITHUB_STEP_SUMMARY
          fi
          echo "Target: Samsung Galaxy SM-X200 · Android 14" >> $GITHUB_STEP_SUMMARY